<div class="container add-goods-container">
    <div class="header-section">
        <h2>📦 Add New Inventory</h2>
        <p>Fill in the details to list your goods for potential clients.</p>
    </div>

    <div class="form-grid">
        <!-- BASIC INFO -->
        <div class="form-card">
            <h3>Basic Information</h3>
            <label>Goods Name</label>
            <input type="text" id="goodsName" placeholder="e.g., Premium Steel, Fresh Grain">

            <label>Category</label>
            <select id="goodsCategory">
                <option value="General">General</option>
                <option value="Construction">Construction</option>
                <option value="Perishables">Perishables</option>
                <option value="Chemicals">Chemicals</option>
                <option value="Electronics">Electronics</option>
                <option value="Textiles">Textiles</option>
            </select>

            <label>Description (Optional)</label>
            <textarea id="goodsDescription" placeholder="Briefly describe the quality or type..."></textarea>
        </div>

        <!-- LOGISTICS & PRICING -->
        <div class="form-card">
            <h3>Logistics & Pricing</h3>
            <label>Price per Ton (USD)</label>
            <div class="input-with-icon">
                <span>$</span>
                <input type="number" id="goodsPrice" placeholder="500" min="0">
            </div>

            <div class="row">
                <div class="col">
                    <label>Total Tons Available</label>
                    <input type="number" id="goodsTons" placeholder="50" min="1">
                </div>
                <div class="col">
                    <label>Items/Packets</label>
                    <input type="number" id="goodsQuantity" placeholder="500" min="1">
                </div>
            </div>

            <label>Transport Vehicle Type</label>
            <input type="text" id="transportVehicle" placeholder="e.g., Heavy Duty Truck">

            <label>Vehicle Capacity (Tons)</label>
            <input type="number" id="vehicleCapacity" placeholder="20" min="1">
        </div>

        <!-- ADDITIONAL DETAILS -->
        <div class="form-card full-width">
            <h3>Additional Details</h3>
            <div class="row">
                <div class="col">
                    <label>Max Time to Shipment</label>
                    <input type="text" id="maxShipmentTime" placeholder="e.g., 24 hours, 2 days">
                </div>
                <div class="col">
                    <label>Expiry Date (if applicable)</label>
                    <input type="date" id="expiryDate">
                </div>
            </div>
        </div>
    </div>

    <div class="actions">
        <button class="primary-btn" onclick="addGoods()">🚀 Add Goods to Inventory</button>
        <button class="secondary-btn" onclick="clearForm()">Clear Form</button>
    </div>
</div>
