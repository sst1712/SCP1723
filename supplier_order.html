<div class="container">
    <h2>Supplier Orders</h2>

<!-- 🔍 FILTERS -->
<div class="filters">
    <button class="filter-btn active" onclick="filterSupplierOrders('All', this)">All</button>
    <button class="filter-btn" onclick="filterSupplierOrders('Pending', this)">Pending</button>
    <button class="filter-btn" onclick="filterSupplierOrders('Transporting', this)">Transporting</button>
    <button class="filter-btn" onclick="filterSupplierOrders('Delayed', this)">Delayed</button>
    <button class="filter-btn" onclick="filterSupplierOrders('Delivered', this)">Delivered</button>
</div>

<!-- 📊 TABLE -->
<table class="orders-table">
    <thead>
        <tr>
            <th>Client</th>
            <th>Goods</th>
            <th>Qty</th>
            <th>Date</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody id="supplierOrdersList"></tbody>
</table>

</div>

<link rel="stylesheet" href="order.css">
